# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
exclude: ^reacnetgenerator/static/webpack/\.yarn/releases/.*$
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        exclude: ^conda/recipe/meta\.yaml$
      - id: check-json
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-symlinks
      - id: check-toml
      - id: mixed-line-ending
  # Python
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.5
    hooks:
      - id: ruff
        args: ["--fix"]
        types_or: [python, pyi, jupyter]
      - id: ruff-format
        types_or: [python, pyi, jupyter]
  - repo: https://github.com/tox-dev/tox-ini-fmt
    rev: "1.7.1"
    hooks:
      - id: tox-ini-fmt
  # numpydoc
  - repo: https://github.com/Carreau/velin
    rev: 0.0.12
    hooks:
      - id: velin
        args: ["--write"]
  # C++
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v22.1.0
    hooks:
      - id: clang-format
        exclude: \.ipynb$

  # Cython
  - repo: https://github.com/MarcoGorelli/cython-lint
    rev: v0.19.0
    hooks:
      - id: cython-lint
      - id: double-quote-cython-strings
  # markdown
  - repo: https://github.com/hukkin/mdformat
    rev: 1.0.0
    hooks:
      - id: mdformat
        additional_dependencies:
          # - mdformat-myst==0.3.0
          # See https://github.com/executablebooks/mdformat-myst/issues/13
          - "git+https://github.com/njzjz-bothub/mdformat-myst@d9c414e#egg=mdformat-myst"
          - mdformat-ruff==0.1.3
          - mdformat-web==0.2.0
          - mdformat-config==0.2.1
          - mdformat-beautysh==1.0.0
          - mdformat-gfm-alerts==2.0.0
  # yaml, CSS, html
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        types_or: [yaml, css, html]
        # workflow files cannot be modified by pre-commit.ci
        exclude: ^conda/recipe/meta\.yaml|\.github/workflows
  # CMake
  - repo: https://github.com/cheshirekow/cmake-format-precommit
    rev: v0.6.13
    hooks:
      - id: cmake-format
  - repo: https://github.com/njzjz/mirrors-bibtex-tidy
    rev: v1.14.0
    hooks:
      - id: bibtex-tidy
        args:
          - --curly
          - --numeric
          - --align=13
          - --blank-lines
          - --sort=key
          - --duplicates=key,doi,citation,abstract
          - --merge=combine
          - --sort-fields
          - --strip-comments
          - --trailing-commas
          - --encode-urls
          - --remove-empty-fields
          - --wrap=80
  # license header
  - repo: https://github.com/Lucas-C/pre-commit-hooks
    rev: v1.5.6
    hooks:
      # C++, js
      - id: insert-license
        files: \.(c|cc|cpp|js|ts)$
        args:
          - --license-filepath
          - .license-header.txt
          - --comment-style
          - //
          - --no-extra-eol
      # CSS
      - id: insert-license
        files: \.(css|scss)$
        args:
          - --license-filepath
          - .license-header.txt
          - --comment-style
          - /*| *| */
          - --no-extra-eol
      # Python
      - id: insert-license
        files: \.(py|pyx)$
        args:
          - --license-filepath
          - .license-header.txt
          - --comment-style
          - "#"
          - --no-extra-eol
      # HTML
      - id: insert-license
        files: \.(html|vue|xml)$
        args:
          - --license-filepath
          - .license-header.txt
          - --comment-style
          - <!--|  ~|  -->
          - --no-extra-eol
